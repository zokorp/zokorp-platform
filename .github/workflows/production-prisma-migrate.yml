name: Production Prisma Migrate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-prisma-migrate
  cancel-in-progress: false

jobs:
  migrate-production:
    runs-on: ubuntu-latest
    environment: production
    env:
      PRODUCTION_DIRECT_DATABASE_URL: ${{ secrets.PRODUCTION_DIRECT_DATABASE_URL }}
      PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Resolve migration database URL
        run: |
          if [ -n "$PRODUCTION_DIRECT_DATABASE_URL" ]; then
            echo "DATABASE_URL=$PRODUCTION_DIRECT_DATABASE_URL" >> "$GITHUB_ENV"
            echo "Using PRODUCTION_DIRECT_DATABASE_URL for migration."
            exit 0
          fi

          if [ -n "$PRODUCTION_DATABASE_URL" ]; then
            echo "DATABASE_URL=$PRODUCTION_DATABASE_URL" >> "$GITHUB_ENV"
            echo "Using PRODUCTION_DATABASE_URL for migration."
            exit 0
          fi

          echo "Missing production database secret. Set PRODUCTION_DIRECT_DATABASE_URL or PRODUCTION_DATABASE_URL in the production environment."
          exit 1

      - name: Validate migration database URL format
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL was not resolved for this workflow."
            exit 1
          fi

          case "$DATABASE_URL" in
            postgres://*|postgresql://*)
              ;;
            *)
              echo "Production database secret must be a full Postgres connection string starting with postgres:// or postgresql://"
              echo "For Supabase migrations, prefer the direct connection string rather than a pooled URL when both are available."
              exit 1
              ;;
          esac

      - name: Guard branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "This workflow must run from main. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Deploy Prisma migrations
        run: npm run prisma:migrate:deploy

      - name: Verify production schema shape
        run: |
          node <<'NODE'
          const { PrismaClient } = require("@prisma/client");

          async function main() {
            const prisma = new PrismaClient();
            try {
              const rows = await prisma.$queryRawUnsafe(`
                select column_name
                from information_schema.columns
                where table_schema = 'public'
                  and table_name = 'ArchitectureReviewJob'
                order by ordinal_position
              `);

              const columnNames = new Set(rows.map((row) => String(row.column_name)));
              const forbidden = ["diagramBytes"];
              const required = [
                "workdriveDiagramFileId",
                "workdriveReportFileId",
                "workdriveUploadStatus",
              ];

              const presentForbidden = forbidden.filter((name) => columnNames.has(name));
              const missingRequired = required.filter((name) => !columnNames.has(name));

              if (presentForbidden.length > 0) {
                throw new Error(`Forbidden columns still present: ${presentForbidden.join(", ")}`);
              }

              if (missingRequired.length > 0) {
                throw new Error(`Required columns missing: ${missingRequired.join(", ")}`);
              }

              console.log("Production schema verification passed for ArchitectureReviewJob.");
            } finally {
              await prisma.$disconnect();
            }
          }

          main().catch((error) => {
            console.error(error instanceof Error ? error.message : error);
            process.exit(1);
          });
          NODE
