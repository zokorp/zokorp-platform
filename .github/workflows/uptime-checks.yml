name: Uptime Checks

on:
  schedule:
    - cron: "11,26,41,56 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: uptime-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  uptime-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Run uptime monitor
        run: node scripts/uptime_monitor.mjs
