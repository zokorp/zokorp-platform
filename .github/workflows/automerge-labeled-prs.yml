name: Auto-Enable Merge For Labeled PRs

on:
  schedule:
    - cron: "5 14 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for eligible PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          prs=$(gh pr list \
            --state open \
            --label automerge \
            --json number,isDraft \
            --jq '.[] | select(.isDraft == false) | .number')

          if [ -z "$prs" ]; then
            echo "No open non-draft PRs with label 'automerge'."
            exit 0
          fi

          while IFS= read -r pr_number; do
            if [ -z "$pr_number" ]; then
              continue
            fi

            echo "Setting auto-merge on PR #$pr_number"
            gh pr merge "$pr_number" --auto --squash --delete-branch || true
          done <<< "$prs"
