name: Codex On Issue Label

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  codex-implement:
    if: github.event.label.name == 'codex'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Codex implementation
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are implementing GitHub issue #${{ github.event.issue.number }} for ZoKorp.
            Title: ${{ github.event.issue.title }}

            Description:
            ${{ github.event.issue.body }}

            Constraints:
            - Follow AGENTS.md in this repo.
            - Keep changes minimal and safe.
            - Run lint, typecheck, and tests when code changes.
            - Do not expose secrets.
            - If auth or billing files are changed, mention it clearly in the PR body.
          codex-args: --full-auto --dangerously-bypass-approvals-and-sandbox

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/issue-${{ github.event.issue.number }}
          title: "feat: codex issue #${{ github.event.issue.number }}"
          commit-message: "feat: codex implementation for issue #${{ github.event.issue.number }}"
          body: |
            Automated implementation generated by Codex for issue #${{ github.event.issue.number }}.

            ### Source issue
            - #${{ github.event.issue.number }}

            ### Validation checklist
            - [ ] `npm run lint`
            - [ ] `npm run typecheck`
            - [ ] `npm test`

            ### Safety gate
            - If this PR modifies authentication or billing flows, explicit human approval is required before merge.
          labels: |
            codex
            automated-pr

      - name: Comment on issue with PR
        if: steps.cpr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const prNumber = `${{ steps.cpr.outputs.pull-request-number }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `Codex opened PR #${prNumber} for this issue.`
            });
